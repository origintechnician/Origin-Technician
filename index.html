<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Origin Technician | Stark HUD Edition</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --cyan: #00f2ff; 
            --stark-red: #ff2e2e;
            --deep-bg: #010811; 
            --glass: rgba(255, 255, 255, 0.05);
            --border-glow: rgba(0, 242, 255, 0.3);
        }

        body { 
            font-family: 'Rajdhani', sans-serif; 
            margin: 0; 
            background: var(--deep-bg); 
            color: #e6f1ff; 
            overflow-x: hidden;
            background-image: radial-gradient(circle at center, #0a192f 0%, #010811 100%);
        }

        /* --- HUD Scanning Effect --- */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        repeating-linear-gradient(0deg, transparent 0, transparent 1px, rgba(0, 242, 255, 0.03) 1px, rgba(0, 242, 255, 0.03) 2px);
            pointer-events: none; z-index: 1000;
        }

        /* Navigation Upgrade */
        .top-nav { 
            background: rgba(1, 8, 17, 0.8); 
            padding: 15px; 
            position: sticky; top: 0; z-index: 101; 
            backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--cyan);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
        }

        .search-bar { 
            width: 100%; padding: 12px 20px; border-radius: 5px; 
            background: var(--glass); border: 1px solid var(--cyan); 
            color: white; outline: none; font-family: 'Orbitron';
            transition: 0.3s;
        }
        .search-bar:focus { box-shadow: 0 0 15px var(--cyan); }

        .logo-section { padding: 30px 0; text-align: center; }
        .logo { 
            width: 180px; filter: drop-shadow(0 0 10px var(--cyan)); 
            transition: 0.5s;
        }
        .logo:hover { transform: scale(1.1); filter: drop-shadow(0 0 20px var(--cyan)); }

        /* Grid Cards - Stark Style */
        .grid-container { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); 
            gap: 20px; padding: 20px; max-width: 800px; margin: 0 auto; 
        }
        .trade-card { 
            background: var(--glass); padding: 20px; border-radius: 5px; 
            text-align: center; cursor: pointer; border: 1px solid var(--border-glow); 
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            backdrop-filter: blur(5px);
        }
        .trade-card:hover { 
            border-color: var(--cyan); transform: translateY(-10px); 
            box-shadow: 0 0 25px rgba(0, 242, 255, 0.4); 
            background: rgba(0, 242, 255, 0.1);
        }
        .trade-card h3 { font-family: 'Orbitron'; font-size: 14px; margin-top: 10px; color: var(--cyan); }
        .trade-card img { width: 50px; filter: brightness(0) invert(1) drop-shadow(0 0 5px var(--cyan)); }

        /* Sections / Containers */
        .booking-section, .review-section, .modal-content { 
            background: var(--glass); border: 1px solid var(--border-glow);
            padding: 30px; border-radius: 10px; backdrop-filter: blur(15px);
            max-width: 600px; margin: 30px auto; 
            box-shadow: inset 0 0 15px rgba(0, 242, 255, 0.05);
        }
        
        h2, h3 { font-family: 'Orbitron'; color: var(--cyan); text-transform: uppercase; letter-spacing: 2px; }

        input, select, textarea { 
            background: rgba(255,255,255,0.05); border: 1px solid var(--border-glow); 
            color: white; padding: 12px; margin: 10px 0; border-radius: 4px;
        }
        input::placeholder { color: rgba(255,255,255,0.3); }

        .btn-confirm { 
            background: transparent; border: 1px solid var(--cyan); 
            color: var(--cyan); padding: 15px; width: 100%; border-radius: 4px; 
            font-family: 'Orbitron'; font-weight: 900; cursor: pointer; 
            transition: 0.3s; text-transform: uppercase;
        }
        .btn-confirm:hover { background: var(--cyan); color: var(--deep-bg); box-shadow: 0 0 30px var(--cyan); }

        /* Star Rating */
        .star-rating label { color: #333; text-shadow: 0 0 5px black; }
        .star-rating input:checked ~ label { color: var(--cyan); text-shadow: 0 0 10px var(--cyan); }

        footer p { font-size: 12px; letter-spacing: 2px; opacity: 0.5; font-family: 'Orbitron'; }
    </style>
</head>
<body>
    <div class="top-nav">
        <div class="search-box">
            <input type="text" id="mainSearch" class="search-bar" placeholder="INITIATING SYSTEM SCAN..." onkeyup="searchHandler()">
            <div id="searchResults"></div>
        </div>
    </div>

    <div class="logo-section">
        <img src="https://frabjous-unicorn-f25784.netlify.app/img/logo.png" class="logo" alt="Origin Logo">
    </div>

    <div class="grid-container">
        <div class="trade-card" onclick="fetchPrices('Electrician')"><img src="https://cdn-icons-png.flaticon.com/512/1904/1904425.png"><h3>Electrician</h3></div>
        <div class="trade-card" onclick="fetchPrices('Civil Work')"><img src="https://cdn-icons-png.flaticon.com/512/2464/2464835.png"><h3>Civil Work</h3></div>
        <div class="trade-card" onclick="fetchPrices('Surveyor')"><img src="https://cdn-icons-png.flaticon.com/512/3501/3501254.png"><h3>Surveyor</h3></div>
        <div class="trade-card" onclick="fetchPrices('Fitter')"><img src="https://cdn-icons-png.flaticon.com/512/1545/1545281.png"><h3>Fitter</h3></div>
    </div>

    <div class="action-btns" style="text-align:center;">
        <button class="btn-confirm" style="width:auto; padding:10px 30px;" onclick="document.getElementById('techModal').style.display='block'">+ JOIN THE AGENCY</button>
    </div>
    
    <div class="booking-section">
        <h2>RESERVE TECHNICIAN</h2>
        <input type="text" id="cName" placeholder="IDENTIFICATION NAME">
        <input type="tel" id="cPhone" placeholder="COMMUNICATION FREQUENCY (MOBILE)">
        <input type="text" id="cAddress" placeholder="DEPLOYMENT COORDINATES (ADDRESS)">
        <select id="cService">
            <option value="">SELECT SERVICE MODULE</option>
            <option>Electrician</option>
            <option>Civil Work</option>
            <option>Surveyor</option>
            <option>Fitter</option>
        </select>
        <button class="btn-confirm" onclick="placeOrder()">CONFIRM DEPLOYMENT</button>
    </div>
    
    <script>
        // ... (Apka pura original Firebase logic yaha paste hoga, jo neeche hai)
        const firebaseConfig = {
            apiKey: "AIzaSyAGMVwci1n9MppCmnlfaT5VOnFZ879BNUM",
            authDomain: "origin-technician-67876.firebaseapp.com",
            projectId: "origin-technician-67876",
            storageBucket: "origin-technician-67876.firebasestorage.app",
            messagingSenderId: "33398191523",
            appId: "1:33398191523:web:501466fb48d00ba4839616",
            databaseURL: "https://origin-technician-67876-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function fetchPrices(t) {
            document.getElementById('tradeTitle').innerText = t;
            db.ref('services/'+t).on('value', snap => {
                let h = ""; snap.forEach(c => { h += `<div class="price-row" style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid rgba(0,242,255,0.1);"><span>${c.val().name}</span><b style="color:var(--cyan)">₹${c.val().price}</b></div>`; });
                document.getElementById('priceContainer').innerHTML = h || "DATA NOT FOUND IN CORE.";
            });
            document.getElementById('priceModal').style.display='block';
        }

        function searchHandler() {
            const q = document.getElementById('mainSearch').value.toLowerCase();
            const res = document.getElementById('searchResults');
            if(q.length < 2) { res.innerHTML = ""; return; }
            db.ref('services').once('value', snap => {
                res.innerHTML = "";
                snap.forEach(trade => { trade.forEach(s => {
                    if(s.val().name.toLowerCase().includes(q)) {
                        res.innerHTML += `<div style="padding:15px; background:var(--deep-bg); border-bottom:1px solid var(--cyan); cursor:pointer; color:var(--cyan)" onclick="selectS('${trade.key}','${s.val().name}')">${s.val().name.toUpperCase()} (${trade.key})</div>`;
                    }
                }); });
            });
        }
        function selectS(t, n) { document.getElementById('mainSearch').value = n; document.getElementById('searchResults').innerHTML = ""; document.getElementById('cService').value = t; fetchPrices(t); }

        function placeOrder() {
            const n = document.getElementById('cName').value, p = document.getElementById('cPhone').value, a = document.getElementById('cAddress').value, s = document.getElementById('cService').value;
            if(n && p && a && s) { db.ref('orders').push({ customer: n, phone: p, address: a, service: s, time: new Date().toLocaleString() }).then(() => { alert("SYSTEM LOG: BOOKING SUCCESSFUL!"); location.reload(); }); }
        }

        function registerTech() {
            const n = document.getElementById('tName').value, p = document.getElementById('tPhone').value, em = document.getElementById('tEmail').value, ad = document.getElementById('tAadhar').value, addr = document.getElementById('tAddress').value, fld = document.getElementById('tField').value, exp = document.getElementById('tExp').value;
            if(n && p && em && ad && addr && fld && exp) { db.ref('tech_requests').push({ name: n, phone: p, email: em, aadhar: ad, address: addr, field: fld, experience: exp, time: new Date().toLocaleString() }).then(() => { alert("APPLICATION RECEIVED."); location.reload(); }); } else { alert("INCOMPLETE DATA."); }
        }

        db.ref('reviews').on('value', snap => {
            let h = ""; snap.forEach(c => { h += `<b style="color:var(--cyan)">${'★'.repeat(c.val().stars)}</b><p style="opacity:0.8">${c.val().text}</p><hr style="border:0.5px solid rgba(0,242,255,0.1)">`; });
            document.getElementById('displayReviews').innerHTML = h || "NO LOGS FOUND.";
        });
    </script>

    <div id="priceModal" class="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:2000;">
        <div class="modal-content"><h2 id="tradeTitle"></h2><div id="priceContainer"></div><button class="btn-confirm" style="margin-top:20px;" onclick="document.getElementById('priceModal').style.display='none'">BACK TO HUD</button></div>
    </div>

    <div id="techModal" class="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:2000;">
        <div class="modal-content"><h2>RECRUITMENT TERMINAL</h2><input type="text" id="tName" placeholder="NAME"><input type="tel" id="tPhone" placeholder="PHONE"><input type="email" id="tEmail" placeholder="EMAIL"><select id="tField"><option value="">SELECT FIELD</option><option>Electrician</option><option>Civil Work</option><option>Surveyor</option><option>Fitter</option></select><button class="btn-confirm" onclick="registerTech()">SUBMIT DOSSIER</button><button class="btn-confirm" style="border-color:var(--stark-red); color:var(--stark-red); margin-top:10px;" onclick="document.getElementById('techModal').style.display='none'">ABORT</button></div>
    </div>

    <footer style="text-align: center; padding: 40px;">
        <p>© 2026 ORIGIN TECHNICIAN // GLOBAL DIVISION</p>
        <a href="portal.html" style="color: var(--cyan); text-decoration: none; font-size: 11px; font-family: 'Orbitron';">AUTHENTICATED ACCESS ONLY</a>
    </footer>
</body>
</html>
